<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barrel Tromp</title>
    <link rel="icon" type="image/png" href="bear-gun-res.png">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:     #0a0010;
            --purple:  #8B1FCC;
            --magenta: #d400ff;
            --cyan:    #00eeff;
            --gold:    #FFD700;
            --orange:  #FF6B00;
            --card-bg: rgba(12, 0, 30, 0.82);
            --outline: 3px solid var(--ink);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #0a0010;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* dark comic-ink overlay so text stays readable over any BG image */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 100% 60% at 50% 0%,   rgba(140,30,220,0.55) 0%, transparent 65%),
                radial-gradient(ellipse 80%  50% at 0%  100%, rgba(0,80,200,0.4)   0%, transparent 60%),
                rgba(8, 0, 20, 0.60);
            pointer-events: none;
            z-index: 0;
        }

        /* scanline grain */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
            pointer-events: none; z-index: 0;
        }

        /* ── GLB MODEL CANVAS ────────────────────────────────── */
        #glb-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }

        /* ── STAR CANVAS ─────────────────────────────────────── */
        #starfield {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
        }

        /* ── NFT PAGE ────────────────────────────────────────── */
        #nft-page {
            display: none;
            position: fixed; inset: 0; z-index: 200;
            background: radial-gradient(ellipse at center, #4a2b7c 0%, #2d1b5e 40%, #1a0d3e 70%, #0d0520 100%);
            flex-direction: column;
            align-items: center;
        }
        #nft-page.visible { display: flex; }

        .nft-back {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            border: 3px solid var(--cyan);
            border-radius: 10px;
            color: var(--cyan);
            font-family: 'Bangers', cursive;
            font-size: 18px; letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(0,238,255,0.4), 4px 4px 0 var(--ink);
            transition: transform 0.15s;
        }
        .nft-back:active { transform: scale(0.95); }

        .nft-logo {
            margin-top: 55px;
            max-width: 260px; width: 70%;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%,100% { filter: drop-shadow(0 0 14px rgba(255,215,0,0.35)); }
            50%      { filter: drop-shadow(0 0 30px rgba(255,215,0,0.75)); }
        }

        .nft-content {
            flex: 1; display: flex;
            align-items: center; justify-content: center;
        }

        .scene { width: 300px; height: 382px; perspective: 1200px; cursor: grab; }
        .scene:active { cursor: grabbing; }

        .card { width:100%; height:100%; position:relative; transform-style:preserve-3d; will-change:transform; }

        .card-face {
            position:absolute; inset:0;
            backface-visibility:hidden;
            border-radius: 16px;
            border: 3px solid rgba(0,200,255,0.9);
            overflow: hidden;
            animation: edgeGlow 2s ease-in-out infinite;
        }
        @keyframes edgeGlow {
            0%,100% { box-shadow: 0 0 18px rgba(0,200,255,0.6), 0 0 36px rgba(0,150,255,0.3); border-color: rgba(0,200,255,0.7); }
            50%      { box-shadow: 0 0 36px rgba(0,220,255,1),   0 0 70px rgba(0,180,255,0.6); border-color: rgba(100,220,255,1); }
        }

        .card-front { background: #1a1a2e; }
        .card-back  { background: #111; transform: rotateY(180deg); }
        .card-face img { width:100%; height:100%; object-fit:cover; display:block; }

        .shine {
            position:absolute; inset:0;
            background: linear-gradient(135deg,rgba(255,255,255,0) 30%,rgba(100,200,255,0.2) 50%,rgba(255,255,255,0) 70%);
            background-size:200% 200%; z-index:2;
            animation: shine-move 4s linear infinite;
            pointer-events:none;
        }
        @keyframes shine-move { from{background-position:-200% -200%} to{background-position:200% 200%} }

        .card-menu-wrapper { width:100%; padding:12px 15px 20px; display:flex; justify-content:center; }
        .card-menu {
            display:flex; gap:10px; padding:12px 16px;
            background:rgba(0,0,0,0.4);
            border-radius:16px;
            border: 2px solid rgba(100,200,255,0.2);
            overflow-x:auto; max-width:100%;
        }
        .card-option {
            width:52px; height:66px; border-radius:8px;
            border: 2px solid rgba(100,200,255,0.3);
            overflow:hidden; cursor:pointer;
            transition:all 0.3s; flex-shrink:0; background:#1a1a2e;
        }
        .card-option img { width:100%; height:100%; object-fit:cover; display:block; }
        .card-option:hover  { transform:translateY(-4px) scale(1.05); border-color:rgba(100,200,255,0.8); }
        .card-option.active { border-color:rgba(0,220,255,1); box-shadow:0 0 18px rgba(0,220,255,0.8); transform:scale(1.1); }

        /* ── MAIN WRAPPER ────────────────────────────────────── */
        .wrapper {
            position: relative; z-index: 1;
            max-width: 560px;
            margin: 0 auto;
            padding: 48px 20px 80px;
            display: flex; flex-direction: column; align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.08s linear;
            will-change: transform;
        }

        /* perspective container wrapping .wrapper */
        .perspective-container {
            perspective: 1000px;
            perspective-origin: 50% 50%;
        }

        /* ── LOGO ────────────────────────────────────────────── */
        .logo {
            width: 240px;
            filter: drop-shadow(0 0 24px rgba(255,215,0,0.55)) drop-shadow(0 4px 0 rgba(0,0,0,0.8));
            animation: logoGlow 3s ease-in-out infinite;
            margin-bottom: 6px;
        }

        .tagline {
            font-family: 'Bangers', cursive;
            font-size: 16px;
            letter-spacing: 4px;
            color: var(--cyan);
            text-shadow: 0 0 12px rgba(0,238,255,0.7), 2px 2px 0 var(--ink);
            margin-bottom: 36px;
            text-transform: uppercase;
            text-align: center;
        }

        /* ── SECTION LABEL ───────────────────────────────────── */
        .section-label {
            font-family: 'Bangers', cursive;
            font-size: 22px;
            letter-spacing: 5px;
            color: var(--gold);
            text-shadow: 0 0 14px rgba(255,215,0,0.6), 2px 2px 0 var(--ink);
            text-transform: uppercase;
            margin: 28px 0 12px;
            align-self: center;
            text-align: center;
        }

        /* ── LINK BUTTONS ────────────────────────────────────── */
        .links { width:100%; display:flex; flex-direction:column; gap:10px; }

        .link-btn {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 15px 20px;
            background: var(--card-bg);
            border: 3px solid rgba(0,200,255,0.5);
            border-radius: 14px;
            color: #fff;
            font-family: 'Bangers', cursive;
            font-size: 18px;
            letter-spacing: 2px;
            text-decoration: none; cursor: pointer;
            position: relative; overflow: hidden;
            /* comic-style hard shadow */
            box-shadow: 4px 4px 0 var(--ink), 0 0 18px rgba(0,150,255,0.15);
            transition: transform 0.12s, box-shadow 0.12s;
            text-shadow: 1px 1px 0 var(--ink);
        }

        /* shimmer sweep */
        .link-btn::before {
            content: '';
            position: absolute; top:0; left:-120%; width:60%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
            transition: left 0.55s;
        }
        .link-btn:hover::before { left: 160%; }

        .link-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 6px 6px 0 var(--ink), 0 0 28px rgba(0,200,255,0.3);
            border-color: var(--cyan);
        }
        .link-btn:active {
            transform: translate(3px,3px);
            box-shadow: 1px 1px 0 var(--ink);
        }

        /* ── TAP BUTTON ──────────────────────────────────────── */
        .tap-btn {
            border-color: var(--cyan);
            background: rgba(0, 80, 160, 0.25);
            animation: tap-pulse 1.3s ease-in-out infinite;
        }
        @keyframes tap-pulse {
            0%,100% { box-shadow: 4px 4px 0 var(--ink), 0 0 14px rgba(0,200,255,0.2); }
            50%      { box-shadow: 4px 4px 0 var(--ink), 0 0 34px rgba(0,220,255,0.55), 0 0 60px rgba(0,150,255,0.25); }
        }
        .tap-btn:hover { animation: none; }

        .oil-drops { position:absolute; inset:0; pointer-events:none; overflow:hidden; border-radius:12px; }
        .oil-drop-anim {
            position:absolute; font-size:14px;
            animation: oil-fall linear infinite; opacity:0;
            filter: brightness(0);
        }
        @keyframes oil-fall {
            0%   { opacity:0; transform:translateY(-10px) scale(0.6); }
            15%  { opacity:1; }
            85%  { opacity:1; }
            100% { opacity:0; transform:translateY(55px) scale(1.3); }
        }

        /* ── NFT LINK ────────────────────────────────────────── */
        .nft-link-btn {
            border-color: var(--magenta);
            background: rgba(100, 0, 180, 0.22);
            box-shadow: 4px 4px 0 var(--ink), 0 0 14px rgba(180,0,255,0.2);
        }
        .nft-link-btn:hover {
            border-color: var(--magenta);
            box-shadow: 6px 6px 0 var(--ink), 0 0 28px rgba(212,0,255,0.4);
        }

        /* ── BUY BUTTONS ─────────────────────────────────────── */
        .buy-btn {
            border-color: var(--gold);
            background: rgba(120, 60, 0, 0.2);
            box-shadow: 4px 4px 0 var(--ink), 0 0 10px rgba(255,180,0,0.15);
        }
        .buy-btn:hover {
            border-color: var(--gold);
            box-shadow: 6px 6px 0 var(--ink), 0 0 24px rgba(255,215,0,0.35);
        }

        /* ── DIVIDER ─────────────────────────────────────────── */
        .divider {
            width: 100%; height: 2px; margin: 6px 0;
            background: linear-gradient(90deg, transparent, rgba(0,220,255,0.3), var(--magenta), rgba(0,220,255,0.3), transparent);
        }

        /* ── FOOTER ──────────────────────────────────────────── */
        .footer {
            margin-top: 44px;
            font-family: 'Bangers', cursive;
            font-size: 13px; letter-spacing: 3px;
            color: rgba(0,238,255,0.25);
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .logo { width: 190px; }
            .link-btn { font-size: 17px; padding: 13px 16px; }
            .scene { width: 265px; height: 338px; }
            .section-label { font-size: 19px; }
        }
    </style>
</head>

<script>
    // ── STAR FIELD ────────────────────────────────────────────
    const canvas = document.getElementById('starfield');
    const ctx    = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    function initStars() {
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.2,
                speed: Math.random() * 0.003 + 0.001,
                phase: Math.random() * Math.PI * 2,
                hue: Math.random() < 0.15 ? (Math.random() < 0.5 ? 280 : 200) : 0 // some purple/cyan stars
            });
        }
    }

    let raf;
    function drawStars(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            const op = 0.15 + 0.85 * Math.abs(Math.sin(s.phase + t * s.speed));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            if (s.hue === 280) ctx.fillStyle = `rgba(200,100,255,${op.toFixed(2)})`;
            else if (s.hue === 200) ctx.fillStyle = `rgba(100,220,255,${op.toFixed(2)})`;
            else ctx.fillStyle = `rgba(255,255,255,${op.toFixed(2)})`;
            ctx.fill();
        });
        raf = requestAnimationFrame(drawStars);
    }

    resizeCanvas(); initStars(); drawStars(0);
    window.addEventListener('resize', () => { resizeCanvas(); initStars(); });


    // ── OIL DROPS ────────────────────────────────────────────
    const oilContainer = document.getElementById('oilDropsContainer');

    function spawnOilDrop() {
        const drop = document.createElement('span');
        drop.className = 'oil-drop-anim';
        drop.textContent = '💧';
        drop.style.left  = (10 + Math.random() * 80) + '%';
        drop.style.top   = (Math.random() * 20) + '%';
        const dur   = 1.0 + Math.random() * 0.9;
        const delay = Math.random() * 1.2;
        drop.style.animationDuration = dur + 's';
        drop.style.animationDelay    = delay + 's';
        drop.style.fontSize = (10 + Math.random() * 8) + 'px';
        oilContainer.appendChild(drop);
        setTimeout(() => drop.remove(), (dur + delay + 0.3) * 1000);
    }

    setInterval(spawnOilDrop, 260);


    // ── NFT PAGE ──────────────────────────────────────────────
    const nftPage = document.getElementById('nft-page');

    document.getElementById('openNFTPage').addEventListener('click', () => {
        nftPage.classList.add('visible');
        cancelAnimationFrame(raf);
    });

    document.getElementById('nftBack').addEventListener('click', () => {
        nftPage.classList.remove('visible');
        drawStars(performance.now() * 0.001);
    });

    const nftScene    = document.getElementById('nftScene');
    const nftCard     = document.getElementById('nftCard');
    const frontImage  = document.getElementById('frontImage');
    const cardOptions = document.querySelectorAll('.card-option');

    let isDragging = false, startX, startY;
    let rotX = -5, rotY = 0, rotZ = 2, targetY = 0, hovering = false;

    cardOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            frontImage.src = `${opt.dataset.card}.png`;
            cardOptions.forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            rotY = Math.round(rotY / 360) * 360;
            targetY = rotY; rotX = -5;
        });
    });

    function animNFT() {
        if (!isDragging) { targetY += hovering ? 0.2 : 0.6; rotY = targetY; }
        nftCard.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) rotateZ(${rotZ}deg)`;
        requestAnimationFrame(animNFT);
    }

    nftScene.addEventListener('mousedown',  e => { isDragging=true; startX=e.clientX; startY=e.clientY; e.preventDefault(); });
    nftScene.addEventListener('touchstart', e => { isDragging=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; e.preventDefault(); }, {passive:false});

    document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        rotY += (e.clientX - startX) * 0.3; rotX -= (e.clientY - startY) * 0.2;
        rotX = Math.max(-85, Math.min(85, rotX)); targetY = rotY;
        startX = e.clientX; startY = e.clientY;
    });

    document.addEventListener('touchmove', e => {
        if (!isDragging) return;
        rotY += (e.touches[0].clientX - startX) * 0.3; rotX -= (e.touches[0].clientY - startY) * 0.2;
        rotX = Math.max(-85, Math.min(85, rotX)); targetY = rotY;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    }, {passive:false});

    document.addEventListener('mouseup',  () => { isDragging = false; });
    document.addEventListener('touchend', () => { isDragging = false; });
    nftScene.addEventListener('mouseenter', () => { hovering = true; });
    nftScene.addEventListener('mouseleave', () => { hovering = false; });

    // ── 3D TILT ON MOUSE MOVE ─────────────────────────────────
    const mainWrapper = document.getElementById('mainWrapper');
    const MAX_TILT = 6; // degrees

    document.addEventListener('mousemove', e => {
        if (nftPage.classList.contains('visible')) return;
        const cx = window.innerWidth  / 2;
        const cy = window.innerHeight / 2;
        const dx = (e.clientX - cx) / cx; // -1 to 1
        const dy = (e.clientY - cy) / cy; // -1 to 1
        const rotY =  dx * MAX_TILT;
        const rotX = -dy * MAX_TILT;
        mainWrapper.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    });

    document.addEventListener('mouseleave', () => {
        mainWrapper.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });

    animNFT();
</script>

<!-- Three.js GLB renderer -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function() {
    const glbCanvas = document.getElementById('glb-canvas');

    const renderer = new THREE.WebGLRenderer({ canvas: glbCanvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding    = THREE.sRGBEncoding;
    renderer.toneMapping       = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 0, 3);

    function resizeGLB() {
        const w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    }
    resizeGLB();
    window.addEventListener('resize', resizeGLB);

    // Lighting — purple ambient + white key + cyan rim
    scene.add(new THREE.AmbientLight(0x8844bb, 0.6));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(2, 3, 4);
    scene.add(keyLight);
    const rimLight = new THREE.DirectionalLight(0x00eeff, 0.8);
    rimLight.position.set(-3, 1, -2);
    scene.add(rimLight);
    const fillLight = new THREE.PointLight(0xaa00ff, 0.5, 20);
    fillLight.position.set(0, -3, 2);
    scene.add(fillLight);

    let model = null, mixer = null;
    const clock = new THREE.Clock();

    const loader = new THREE.GLTFLoader();
    loader.load('model_fixed.glb', (gltf) => {
        model = gltf.scene;

        // Texture is now embedded in model_fixed.glb — ensure sRGB encoding
        model.traverse(child => {
            if (child.isMesh) {
                if (child.material.map) {
                    child.material.map.encoding = THREE.sRGBEncoding;
                }
                child.material.needsUpdate = true;
            }
        });

        // Center and auto-scale to fill background
        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const scale  = 2.8 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        model.position.y -= 0.3;
        scene.add(model);

        if (gltf.animations && gltf.animations.length) {
            mixer = new THREE.AnimationMixer(model);
            gltf.animations.forEach(c => mixer.clipAction(c).play());
        }
    }, undefined, err => console.warn('GLB error:', err));

    // Mouse tracking — model gently follows cursor
    let tRX = 0, tRY = 0, cRX = 0, cRY = 0;
    window.addEventListener('mousemove', e => {
        tRY =  ((e.clientX / window.innerWidth)  - 0.5) * 0.5;
        tRX = -((e.clientY / window.innerHeight) - 0.5) * 0.25;
    });

    (function loop() {
        requestAnimationFrame(loop);
        const d = clock.getDelta(), t = clock.getElapsedTime();
        cRX += (tRX - cRX) * 0.04;
        cRY += (tRY - cRY) * 0.04;
        if (model) {
            model.rotation.y = cRY + Math.sin(t * 0.35) * 0.07;
            model.rotation.x = cRX + Math.sin(t * 0.25) * 0.03;
        }
        if (mixer) mixer.update(d);
        renderer.render(scene, camera);
    })();
})();
</script>

</body>
